; ============================================================
;  PlatformIO Project Configuration
;  Target: Teensy 4.1
;  Project: CoreXY Petri Dish Transfer System
; ============================================================

[platformio]
default_envs = teensy41

; ------------------------------------------------------------
;  Shared settings (inherited by all envs)
; ------------------------------------------------------------
[common]
lib_deps =
    https://github.com/ftrias/TeensyThreads
    bblanchon/ArduinoJson @ ^6.21.3
    paulstoffregen/Encoder @ ^1.4.4

build_flags =
    -std=gnu++17                    ; C++17 features (structured bindings, if-constexpr, etc.)
    -Wall                           ; All standard warnings
;   -Wextra                         ; Extra warnings
    -Wno-unused-parameter           ; Suppress noisy unused-param warnings during scaffolding
    -DSERIAL_BAUD=115200            ; Baud rate available as compile-time constant
    -DDEBUG_SERIAL=Serial           ; Route debug output to USB serial
    -fno-exceptions
    -fno-rtti
    -fno-unwind-tables

; ------------------------------------------------------------
;  Production environment
; ------------------------------------------------------------
[env:teensy41]
platform  = teensy
board     = teensy41
framework = arduino

monitor_speed = 115200
monitor_port  = COM4

lib_deps   = ${common.lib_deps}
build_flags = ${common.build_flags}

build_src_filter =
    +<*>
    -<testing/>
    -<Main test.cpp>                ; Exclude test files from production build

; ------------------------------------------------------------
;  Testing environment — compiles only the testing/ folder
; ------------------------------------------------------------
[env:teensy41_test]
platform  = teensy
board     = teensy41
framework = arduino

monitor_speed = 115200

lib_deps   = ${common.lib_deps}
build_flags =
    ${common.build_flags}
    -DTEST_MODE                    ; Lets test files use #ifdef TEST_MODE guards

build_src_filter =
    +<main_test.cpp>                    ; Still needs an entry point
    +<testing/>
    +<devices/>
    +<control/>
    +<core/>
    +<math/>
    +<state/>